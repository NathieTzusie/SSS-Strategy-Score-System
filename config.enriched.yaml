# Strategy Enable Score System v1.1 — Enriched Regression Config
# Purpose: P2-9 回归验证，使用 enriched_trades.csv 作为输入
# 注意：此文件仅用于回归测试，不作为默认配置
# 生成时间: 2026-05-14

input_path:
  - "outputs/data_quality/enriched_trades.csv"

output_dir: "outputs/validation_enriched_mock"

# 以下所有参数与 config.yaml 完全一致，确保回归验证的可重复性
min_trades: 30
recent_trade_window: 20

regime_schema:
  use_layered_regime_fields: true
  fill_missing_layered_fields_with: "unknown"

monte_carlo:
  iterations: 5000
  method: "bootstrap"
  drawdown_threshold_R: 10
  random_seed: 42

market_opportunity:
  enabled: false
  default_score: 1.0

edge_concentration:
  enabled: true
  largest_win_warning_threshold: 0.35
  top_5_warning_threshold: 0.60
  top_10_percent_warning_threshold: 0.70

score_weights:
  regime_edge: 0.40
  recent_health: 0.15
  monte_carlo_stability: 0.25
  risk_control: 0.20

score_thresholds:
  strong_enable: 80
  medium_enable: 65
  weak_enable: 50

metric_caps:
  max_profit_factor: 10.0
  max_payoff_ratio: 10.0

review_rules:
  losing_streak_review_threshold: 4
  mc_drawdown_probability_review_threshold: 0.25
  low_sample_requires_review: true
  edge_concentration_requires_review: true

filters:
  symbol: []
  strategy_name: []
  date_start: null
  date_end: null

validation:
  duplicate_trade_id: "warning"
  require_exit_after_entry: true
  fill_missing_state_with: "unknown"

label_quality:
  enabled: true
  output_dir: "outputs/data_quality"
  cleaned_csv_name: "cleaned_trades.csv"
  preserve_original_regime_snapshot_id: true

  session_backfill:
    enabled: true
    overwrite_existing: false
    timezone: "UTC"
    rules:
      Asia: [0, 9]
      London: [7, 16]
      NY: [12, 21]
      overlap: [12, 16]

  structure_state_backfill:
    enabled: true
    overwrite_existing: false
    source_field: "regime"

  regime_snapshot_normalization:
    enabled: true
    overwrite_existing: false
    preserve_original_column: "original_regime_snapshot_id"
    format: "{regime}_{YYYYMMDD}"

  readiness:
    unknown_warning_threshold: 0.20
    unknown_blocking_threshold: 0.50
    snapshot_unique_ratio_too_high: 0.70
    snapshot_unique_ratio_too_low: 0.05
    snapshot_min_avg_trades_per_snapshot: 2

coinglass:
  enabled: false
  api_key_env: "COINGLASS_API_KEY"
  base_url: "https://open-api-v4.coinglass.com"
  cache_dir: "data/external/coinglass"
  output_dir: "outputs/coinglass"
  user_agent: "strategy-enable-system/1.1"
  rate_limit_per_minute: 30
  request_timeout_seconds: 30
  retry_count: 2
  retry_backoff_seconds: 2

  symbols:
    - BTC
    - ETH

  futures:
    exchanges:
      - Binance
    exchange_list:
      - Binance
      - OKX
      - Bybit
    interval: "1d"
    intraday_interval: "1h"
    limit: 1000
    endpoints:
      open_interest_aggregated: true
      funding_oi_weight: true
      taker_buy_sell_aggregated: true

  etf:
    endpoints:
      bitcoin_flow_history: true
      ethereum_flow_history: true

  calendar:
    enabled: true
    language: "en"
    lookback_days: 15
    lookahead_days: 15

  fetch:
    mode: "dry_run"
    allow_network: false
    overwrite_raw_cache: false
    overwrite_processed: true

label_enrichment:
  enabled: true
  input_path: "outputs/data_quality/cleaned_trades.csv"
  output_path: "outputs/data_quality/enriched_trades.csv"
  audit_report_path: "outputs/data_quality/enrichment_audit_report.md"
  processed_dir: "data/external/coinglass/processed"
  preserve_original_columns: true

  alignment:
    time_field: "entry_time"
    prevent_lookahead: true
    futures_interval: "1h"
    daily_interval: "1d"
    max_staleness_hours:
      futures: 48
      etf: 96
      calendar: 48

  thresholds:
    oi_change_pct_rising: 0.03
    oi_change_pct_falling: -0.03
    funding_positive: 0.0001
    funding_negative: -0.0001
    taker_imbalance_bullish: 0.10
    taker_imbalance_bearish: -0.10
    etf_flow_inflow_usd: 50000000
    etf_flow_outflow_usd: -50000000
    macro_event_window_hours: 12
    macro_high_importance_level: 3

  fields:
    enrich_oi_state: true
    enrich_funding_state: true
    enrich_orderflow_state: true
    enrich_etf_flow_state: true
    enrich_macro_state: true
